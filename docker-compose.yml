services:
  yt-downloader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youtube-downloader
    restart: unless-stopped
    cap_add:
      - NET_ADMIN      # required to create WireGuard interfaces and set iptables rules
    labels:
      - "net.unraid.docker.icon=https://img.icons8.com/?size=100&id=O0rFPukE4XcO&format=png&color=000000"
      - "net.unraid.docker.webui=http://[IP]:[PORT:8090]"
    environment:
      # ── PIA credentials (required for VPN) ──────────────────────────────
      - PIA_USER=your_pia_username
      - PIA_PASS=your_pia_password
      # ── PIA region ───────────────────────────────────────────────────────
      # Common values: us_silicon_valley, us_new_york, us_chicago, us_seattle,
      #                uk_london, ca_toronto, de_berlin, nl_amsterdam
      - PIA_REGION=us_silicon_valley
      # ── Download paths ───────────────────────────────────────────────────
      - DOWNLOAD_DIR=/downloads
      - DATA_DIR=/data
      - WEBUI_PORT=8090
    volumes:
      - /mnt/user/data/youtube:/downloads   # your Unraid share
      - yt_data:/data                        # persists download history DB
    ports:
      - "8090:8090"
    networks:
      - oakwoodproxy

networks:
  oakwoodproxy:
    external: true

volumes:
  yt_data:
