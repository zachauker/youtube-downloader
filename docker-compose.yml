services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DOWNLOAD_DIR=/downloads
      - DATA_DIR=/data
    volumes:
      - /mnt/user/data/youtube:/downloads   # your Unraid share
      - yt_data:/data                        # persists DB across container restarts
    # Not exposed directly — nginx proxies to it

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "8080:80"     # Access at http://<unraid-ip>:8080
    depends_on:
      - backend

volumes:
  yt_data:    # Named volume — Docker manages this on the Unraid host
