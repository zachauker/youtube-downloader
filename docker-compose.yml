services:
  yt-downloader:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DOWNLOAD_DIR=/downloads
      - DATA_DIR=/data
    volumes:
      - /mnt/user/data/youtube:/downloads   # your Unraid share
      - yt_data:/data                        # persists download history DB
    ports:
      - "8090:80"

volumes:
  yt_data:
