services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DOWNLOAD_DIR=/downloads
      - DATA_DIR=/data
    labels:
      - "net.unraid.docker.icon=https://img.icons8.com/?size=100&id=O0rFPukE4XcO&format=png&color=000000"
      - "net.unraid.docker.webui=http://[IP]:[PORT:8090]"
    volumes:
      - /mnt/user/data/youtube:/downloads   # your Unraid share
      - yt_data:/data                        # persists DB across container restarts
    # Not exposed directly — nginx proxies to it

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "8090:80"     # Access at http://<unraid-ip>:8090
    depends_on:
      - backend

networks:
  oakwoodproxy:
    external: true

volumes:
  yt_data:    # Named volume — Docker manages this on the Unraid host
