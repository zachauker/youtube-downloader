services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DOWNLOAD_DIR=/downloads
      - DATA_DIR=/data
    volumes:
      - downloads:/downloads
      - data:/data
    # Not exposed directly — nginx proxies to it

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "8080:80"     # Change 8080 to your preferred port
    depends_on:
      - backend

volumes:
  downloads:
    # Override with a bind mount for a custom path on Unraid, e.g.:
    # driver: local
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /mnt/user/media/youtube
  data:
